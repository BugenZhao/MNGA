    posts:
      - content: |
          [b][*] 频繁出现 API、验证错误或未登录提示怎么办？[/b]
          请查看 [tid=mnga_api_auth_fix]API 与验证错误解决方案[/tid]，手动更换后端地址或升级到 MNGA v2.3.1。

          [b][*] MNGA 浏览帖子时出现 403 Forbidden 错误？[/b]
          此为官方接口变更所致，请更新到 MNGA v2.2.2 或更高版本。
          [url=https://apps.apple.com/cn/app/mnga/id1586461246?l=zh][b]App Store 更新[/b][/url]

          [b][*] 如何自定义文字大小？[/b]
          如果您需要更大字体，可以在 [b]设置/话题内容样式[/b] 中选择“更大字体”。
          如果您需要进一步自定义字体大小，请在 iOS 控制中心添加“文字大小”控制，打开 App 后可以用它单独调整 MNGA 的文字大小。

          [b][*] 开了去广告服务后，MNGA 网络报错？[/b]
          请尝试在 [b]设置/后端[/b] 中使用其它域名。

          ===参见===
          [tid=mnga_about_feedback]MNGA 关于 & 反馈[/tid]
