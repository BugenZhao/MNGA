          [b]Make NGA Great Again[/b]

          感谢您使用 MNGA。如果您在使用 MNGA App 的遇到了一些问题，或是希望添加新的功能，您可以通过下方的选项进行反馈。
          [url=https://apps.apple.com/cn/app/mnga/id1586461246?l=zh][b]App Store 评论区[/b][/url]
          [url=mailto:mnga.feedback@bugenzhao.com][b]反馈邮箱[/b][/url]
          [url=https://github.com/BugenZhao/MNGA/issues][b]GitHub Issues[/b][/url]

          === 【新】MNGA 浏览帖子时出现 403 Forbidden 错误？ ===
          此为官方接口变更所致，请更新到 MNGA v2.2.2 或更高版本。
          [url=https://apps.apple.com/cn/app/mnga/id1586461246?l=zh][b]App Store 更新[/b][/url]

          === MNGA TestFlight 版本 ===
          MNGA TestFlight 版本提供更快的迭代速度和免费的 Plus 解锁，如果您喜爱尝鲜，可以在下方链接加入 TestFlight 群组。
          [url]https://testflight.apple.com/join/urjr3ryK[/url]
          您需要使用最新的 iOS/iPad OS 才能加入。如果仍然显示无法加入，则说明当前位置已满，或暂时没有更新的测试版本，请过段时间再试。

